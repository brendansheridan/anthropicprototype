<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude – Anthropic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M16.5 3.5L7.5 12.5L16.5 21.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 3.5L3 12.5L12 21.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
          </svg>
          <span class="logo-text">Claude</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn" title="New chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
      <div class="sidebar-conversations">
        <div class="conversation-item active">
          <span>Customer Service Demo</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-footer-item">
          <span>Salesforce Integration Active</span>
          <span class="status-dot"></span>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      <div class="chat-container">
        <div class="messages" id="messages">
          <!-- Welcome state -->
          <div class="welcome" id="welcome">
            <div class="welcome-logo">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                <path d="M16.5 3.5L7.5 12.5L16.5 21.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 3.5L3 12.5L12 21.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
              </svg>
            </div>
            <h1>How can I help you today?</h1>
            <p class="welcome-subtitle">I'm connected to Salesforce and can create cases, schedule follow-ups, and track your support needs in real time.</p>
            <div class="welcome-suggestions">
              <button class="suggestion-chip" data-message="Hi, I need help with an issue">Report an issue</button>
              <button class="suggestion-chip" data-message="I'm having a problem with my account login">Account problem</button>
              <button class="suggestion-chip" data-message="I can't access my billing information">Billing issue</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container">
          <textarea
            id="messageInput"
            placeholder="Message Claude..."
            rows="1"
            autofocus
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="disclaimer">Claude can make mistakes. This demo creates real records in Salesforce.</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
