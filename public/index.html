<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude</title>
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/anthropic.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Narrow icon sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo" title="Claude">
          <img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/anthropic.png" alt="Anthropic" width="28" height="28">
        </div>
        <button class="sidebar-icon-btn" id="newChatBtn" title="New chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="sidebar-icon-btn" title="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="sidebar-icon-btn" title="Recents">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="sidebar-icon-btn" title="Projects">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <button class="sidebar-icon-btn" title="Library">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
      </div>
      <div class="sidebar-bottom">
        <button class="sidebar-icon-btn" title="Download">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <div class="sidebar-avatar">B</div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      <!-- Top bar -->
      <header class="chat-header" id="chatHeader">
        <div class="chat-title">
          <span id="chatTitleText">New chat</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <button class="share-btn">Share</button>
      </header>

      <div class="chat-container">
        <div class="messages" id="messages">
          <!-- Welcome state -->
          <div class="welcome" id="welcome">
            <div class="welcome-icon">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L13.5 8.5L20 7L15 12L20 17L13.5 15.5L12 22L10.5 15.5L4 17L9 12L4 7L10.5 8.5L12 2Z" fill="#d4856a" stroke="#d4856a" stroke-width="0.5"/>
              </svg>
            </div>
            <h1>Back at it, B</h1>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container">
          <textarea
            id="messageInput"
            placeholder="How can I help you today?"
            rows="1"
            autofocus
          ></textarea>
          <div class="input-bottom-row">
            <button class="input-icon-btn" title="Attach">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
            <div class="input-right">
              <span class="model-label">Sonnet 4.6 <span class="model-mode">Low</span> <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
              <button class="input-icon-btn mic-btn" title="Voice">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
              </button>
              <button class="input-icon-btn eq-btn" title="Audio">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="8" width="2" height="8"/><rect x="8" y="5" width="2" height="14"/><rect x="12" y="3" width="2" height="18"/><rect x="16" y="7" width="2" height="10"/><rect x="20" y="10" width="2" height="4"/></svg>
              </button>
              <button class="send-btn" id="sendBtn" disabled title="Send">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <!-- Suggestion chips below input -->
        <div class="suggestions" id="suggestions">
          <button class="suggestion-chip" data-message="Hi, I need help with an issue">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Write
          </button>
          <button class="suggestion-chip" data-message="I'm having a problem with my account login">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            Report Issue
          </button>
          <button class="suggestion-chip" data-message="I can't access my billing information">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            Billing Help
          </button>
          <button class="suggestion-chip" data-message="I need to update my contact information">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Update Info
          </button>
        </div>
        <p class="disclaimer">Claude is AI and can make mistakes. Please double-check responses.</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
