<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anthropic — Developer Concierge</title>
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/anthropic.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <header class="header">
      <a href="/" class="back-btn" title="Back to Claude">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="header-brand">
        <img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/anthropic.png" alt="Anthropic" width="28" height="28" class="header-logo">
        <span class="header-title">Developer Concierge</span>
      </div>
      <div class="header-user">
        <span class="user-name">Brendan S.</span>
        <div class="user-avatar">B</div>
      </div>
    </header>

    <!-- Main content -->
    <main class="main">
      <!-- Welcome section -->
      <div class="welcome-section" id="welcomeSection">
        <div class="welcome-content">
          <h1>Welcome back, Brendan</h1>
          <p class="welcome-subtitle">How can I help you manage your Anthropic account today?</p>

          <div class="search-bar" id="searchBar">
            <input type="text" id="searchInput" placeholder="Ask about billing, API usage, plans, or anything else...">
            <button class="search-submit" id="searchSubmit">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>

          <div class="category-buttons">
            <button class="category-btn" data-message="Show me my billing summary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
              Billing
            </button>
            <button class="category-btn" data-message="Show me my API usage and rate limits">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              API Usage
            </button>
            <button class="category-btn" data-message="What API keys and access do I have configured?">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
              API Access
            </button>
            <button class="category-btn" data-message="What plans are available and how do they compare?">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
              Plans & Pricing
            </button>
          </div>
        </div>
      </div>

      <!-- Chat section (hidden initially) -->
      <div class="chat-section" id="chatSection">
        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
          <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Press SPACE to start..." readonly>
            <button class="chat-send-btn" id="chatSendBtn" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
          <div class="input-hint" id="inputHint">Press SPACE to type next message, then ENTER to send</div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
